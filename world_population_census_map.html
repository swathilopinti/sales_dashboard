<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>World Population Census Map</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; padding: 1.5rem; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; color: #f0ede6; }
    .metric { background: #2c2c2a !important; }
    .card { background: #242422 !important; border-color: rgba(255,255,255,.1) !important; }
    .det-stat { background: #2c2c2a !important; border-color: rgba(255,255,255,.08) !important; }
    button { border-color: rgba(255,255,255,.2) !important; color: #f0ede6 !important; }
    button.active { background: rgba(255,255,255,.08) !important; }
    #tooltip { background: #242422 !important; border-color: rgba(255,255,255,.15) !important; color: #f0ede6 !important; }
  }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: .25rem; }
  .subtitle { font-size: 13px; color: #888780; margin-bottom: 1.25rem; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1rem; }
  .metric { background: #eae8e2; border-radius: 8px; padding: .75rem 1rem; text-align: center; }
  .metric-val { font-size: 22px; font-weight: 500; }
  .metric-lbl { font-size: 12px; color: #888780; }
  .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: .75rem; }
  .controls span { font-size: 13px; color: #888780; }
  button { cursor: pointer; border-radius: 8px; border: 0.5px solid #b4b2a9; background: transparent; color: #1a1a18; padding: 5px 12px; font-size: 13px; font-family: inherit; }
  button:hover { background: #eae8e2; }
  button.active { background: #eae8e2; font-weight: 500; }
  .map-wrap { position: relative; }
  svg { display: block; width: 100%; border-radius: 10px; background: #ddeeff; }
  @media (prefers-color-scheme: dark) { svg { background: #1c2535; } }
  path.country { cursor: pointer; transition: opacity .15s; }
  path.country:hover { opacity: .75; stroke-width: 1.5px !important; }
  path.country.selected { stroke: #e24b4a !important; stroke-width: 2px !important; }
  #tooltip { position: absolute; background: #fff; border: 0.5px solid #b4b2a9; border-radius: 8px; padding: 8px 12px; font-size: 13px; pointer-events: none; display: none; z-index: 99; min-width: 160px; }
  .legend-row { display: flex; align-items: center; gap: 10px; margin-top: .5rem; }
  .legend-row span { font-size: 11px; color: #888780; }
  #legend-bar { flex: 1; height: 10px; border-radius: 4px; }
  #country-detail { display: none; margin-top: 1rem; background: #eae8e2; border-radius: 12px; padding: 1rem 1.25rem; }
  @media (prefers-color-scheme: dark) { #country-detail { background: #242422; } }
  .det-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: .75rem; }
  .det-head h2 { font-size: 16px; font-weight: 500; }
  #det-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
  .det-stat { background: #fff; border-radius: 8px; padding: .6rem .9rem; border: 0.5px solid #d3d1c7; }
  .det-stat p:first-child { font-size: 11px; color: #888780; margin-bottom: 2px; }
  .det-stat p:last-child { font-size: 16px; font-weight: 500; }
  .det-foot { margin-top: .75rem; }
  footer { margin-top: 1.5rem; font-size: 12px; color: #888780; text-align: center; }
</style>
</head>
<body>
<h1>World Population Census Map</h1>
<p class="subtitle">2024 estimates · click a country to explore · hover for quick stats</p>

<div class="metrics">
  <div class="metric"><div class="metric-val" id="m-world">8.1B</div><div class="metric-lbl">World population</div></div>
  <div class="metric"><div class="metric-val" id="m-sel">—</div><div class="metric-lbl">Selected country</div></div>
  <div class="metric"><div class="metric-val" id="m-pct">—</div><div class="metric-lbl">% of world</div></div>
  <div class="metric"><div class="metric-val" id="m-den">—</div><div class="metric-lbl">Density (per km²)</div></div>
</div>

<div class="controls">
  <span>Color by:</span>
  <button class="active" id="btn-pop" onclick="setMode('pop')">Population</button>
  <button id="btn-den" onclick="setMode('den')">Density</button>
  <button id="btn-gr" onclick="setMode('gr')">Growth rate</button>
</div>

<div class="map-wrap">
  <svg id="wmap-svg" viewBox="0 0 960 480" role="img" aria-label="Interactive choropleth world map showing population census data by country"></svg>
  <div id="tooltip"></div>
</div>

<div class="legend-row">
  <span id="leg-lo"></span>
  <div id="legend-bar"></div>
  <span id="leg-hi"></span>
</div>

<div id="country-detail">
  <div class="det-head">
    <h2 id="det-name"></h2>
    <button onclick="clearSelection()">✕ close</button>
  </div>
  <div id="det-stats"></div>
  <div class="det-foot">
    <button onclick="window.open('https://www.google.com/search?q='+encodeURIComponent(document.getElementById(\'det-name\').textContent+\' population demographics\'))">Search demographics ↗</button>
  </div>
</div>

<footer>Data: 2024 estimates. Sources: UN World Population Prospects, World Bank.</footer>

let mode = 'pop';
let selId = null;
const WORLD_POP = 8117000000;
const fmt = n => n >= 1e9 ? (n/1e9).toFixed(2)+'B' : n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(0)+'K' : n;

function setMode(m) {
  mode = m;
  document.querySelectorAll('button[id^=btn]').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-'+m).classList.add('active');
  updateColors();
}

function getVal(d) {
  if (!d) return null;
  if (mode === 'pop') return d.pop;
  if (mode === 'den') return d.pop / d.area;
  if (mode === 'gr') return d.gr;
}

function colorScale() {
  if (mode === 'pop') return d3.scaleSequentialLog([100000, 1500000000], d3.interpolateBlues).clamp(true);
  if (mode === 'den') return d3.scaleSequentialLog([0.1, 1500], d3.interpolateYlOrRd).clamp(true);
  if (mode === 'gr') return d3.scaleDiverging([-1, 0, 4], d3.interpolateRdYlGn).clamp(true);
}

function updateColors() {
  const scale = colorScale();
  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const noData = isDark ? '#2c2c2a' : '#d3d1c7';
  d3.selectAll('path.country').attr('fill', function(d) {
    const row = DATA[+d.id];
    const v = getVal(row);
    return v != null ? scale(v) : noData;
  });
  const labels = {pop:{lo:'Smaller',hi:'Larger'},den:{lo:'Low density',hi:'High density'},gr:{lo:'Declining',hi:'High growth'}};
  document.getElementById('leg-lo').textContent = labels[mode].lo;
  document.getElementById('leg-hi').textContent = labels[mode].hi;
  const colors = d3.range(0,101).map(t => scale(scale.domain()[0]+(scale.domain()[scale.domain().length-1]-scale.domain()[0])*t/100));
  document.getElementById('legend-bar').style.background = `linear-gradient(to right,${colors.join(',')})`;
}

function clearSelection() {
  selId = null;
  d3.selectAll('path.country').classed('selected', false);
  document.getElementById('country-detail').style.display = 'none';
  ['m-sel','m-pct','m-den'].forEach(id => document.getElementById(id).textContent = '—');
}

function showCountry(id) {
  const row = DATA[+id];
  selId = id;
  d3.selectAll('path.country').classed('selected', false);
  d3.select('#c-'+id).classed('selected', true);
  if (!row) { document.getElementById('country-detail').style.display = 'none'; return; }
  const den = (row.pop/row.area).toFixed(1);
  const pct = ((row.pop/WORLD_POP)*100).toFixed(2);
  document.getElementById('m-sel').textContent = fmt(row.pop);
  document.getElementById('m-pct').textContent = pct+'%';
  document.getElementById('m-den').textContent = den;
  document.getElementById('det-name').textContent = row.n;
  const stats = [
    {label:'Population', val:fmt(row.pop)},
    {label:'Area (km²)', val:(+row.area).toLocaleString()},
    {label:'Density', val:den+' /km²'},
    {label:'Growth rate', val:row.gr+' %/yr'},
    {label:'% of world', val:pct+'%'},
  ];
  document.getElementById('det-stats').innerHTML = stats.map(s =>
    `<div class="det-stat"><p>${s.label}</p><p>${s.val}</p></div>`
  ).join('');
  document.getElementById('country-detail').style.display = 'block';
}

const svg = d3.select('#wmap-svg');
const proj = d3.geoNaturalEarth1().scale(153).translate([480,240]);
const path = d3.geoPath(proj);
const tip = document.getElementById('tooltip');

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world => {
  const features = topojson.feature(world, world.objects.countries).features;
  svg.selectAll('path.country').data(features).join('path')
    .attr('class','country')
    .attr('id', d => 'c-'+d.id)
    .attr('d', path)
    .attr('stroke', () => matchMedia('(prefers-color-scheme:dark)').matches ? 'rgba(255,255,255,.18)' : 'rgba(0,0,0,.18)')
    .attr('stroke-width', .4)
    .on('mousemove', function(event, d) {
      const row = DATA[+d.id];
      const name = row ? row.n : 'Country #'+d.id;
      const v = getVal(row);
      const valStr = v != null ? (mode==='pop'?fmt(v):mode==='den'?v.toFixed(1)+' /km²':v+' %/yr') : 'No data';
      tip.style.display = 'block';
      tip.style.left = (event.offsetX+12)+'px';
      tip.style.top = (event.offsetY-10)+'px';
      tip.innerHTML = `<strong style="font-size:14px;">${name}</strong><br><span style="color:#888780;font-size:12px;">${mode==='pop'?'Population':mode==='den'?'Density':'Growth'}: ${valStr}</span>`;
    })
    .on('mouseleave', () => { tip.style.display = 'none'; })
    .on('click', (event, d) => showCountry(d.id));
  updateColors();
});
</script>
</body>
</html>
