<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake Game</title>
  <style>
    /* ── Base ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
    }

    /* ── App Card ── */
    .app {
      background: #16213e;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      width: 420px;
    }

    h1 { font-size: 28px; margin-bottom: 4px; color: #4ecca3; }

    /* ── Score Row ── */
    .score-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 14px;
      color: #aaa;
    }
    .score-row span { color: white; font-weight: bold; }

    /* ── Canvas (game board) ── */
    canvas {
      display: block;
      border: 3px solid #4ecca3;
      border-radius: 8px;
      margin: 0 auto 14px;
    }

    /* ── Difficulty Buttons ── */
    .diff-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; }
    .diff-btn {
      padding: 6px 18px;
      border: 1.5px solid #555;
      background: transparent;
      color: #aaa;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
    }
    .diff-btn.active { background: #4ecca3; border-color: #4ecca3; color: #1a1a2e; font-weight: bold; }

    /* ── Start / Restart Button ── */
    #startBtn {
      padding: 10px 36px;
      background: #4ecca3;
      color: #1a1a2e;
      border: none;
      border-radius: 24px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 14px;
    }
    #startBtn:hover { background: #38b2a0; }

    /* ── On-Screen Arrow Keys (mobile) ── */
    .dpad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 4px; justify-content: center; }
    .dpad button {
      width: 48px; height: 48px;
      background: #0f3460; border: 1.5px solid #4ecca3;
      color: #4ecca3; font-size: 20px;
      border-radius: 8px; cursor: pointer;
    }
    .dpad button:hover { background: #4ecca3; color: #1a1a2e; }
    .dpad button:active { transform: scale(0.92); }
    #dUp    { grid-area: up; }
    #dLeft  { grid-area: left; }
    #dRight { grid-area: right; }
    #dDown  { grid-area: down; }

    /* ── Status Message ── */
    #msg { font-size: 13px; color: #888; margin-top: 10px; min-height: 18px; }
  </style>
</head>
<body>
<div class="app">

  <h1>🐍 Snake</h1>

  <!-- Score display -->
  <div class="score-row">
    <div>Score: <span id="score">0</span></div>
    <div>Best:  <span id="best">0</span></div>
    <div>Level: <span id="levelDisplay">1</span></div>
  </div>

  <!-- Game canvas -->
  <canvas id="canvas" width="380" height="380"></canvas>

  <!-- Difficulty selector -->
  <div class="diff-row">
    <button class="diff-btn active" data-speed="150">Slow</button>
    <button class="diff-btn"        data-speed="100">Normal</button>
    <button class="diff-btn"        data-speed="60">Fast</button>
  </div>

  <!-- Start / Restart -->
  <button id="startBtn">▶ Start Game</button>

  <!-- Mobile D-Pad -->
  <div class="dpad">
    <button id="dUp">▲</button>
    <button id="dLeft">◀</button>
    <button id="dRight">▶</button>
    <button id="dDown">▼</button>
  </div>

  <div id="msg">Press Start or use arrow keys to play</div>

</div>

<script>
// ─────────────────────────────────────────────
// CANVAS SETUP
// ─────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

const TILE  = 20;                         // size of each grid square in pixels
const COLS  = canvas.width  / TILE;       // 19 columns
const ROWS  = canvas.height / TILE;       // 19 rows

// ─────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────
let snake    = [];       // array of {x, y} segments; index 0 = head
let dir      = { x: 1, y: 0 };   // current direction
let nextDir  = { x: 1, y: 0 };   // queued direction (prevents double-reverse)
let food     = {};       // {x, y} of the food
let score    = 0;
let best     = 0;
let level    = 1;
let speed    = 150;      // ms between each game tick (lower = faster)
let gameLoop = null;     // setInterval reference
let running  = false;

// ─────────────────────────────────────────────
// START / RESTART
// ─────────────────────────────────────────────
function startGame() {
  // Reset state
  clearInterval(gameLoop);
  score   = 0;
  level   = 1;
  running = true;
  dir     = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };

  // Snake starts with 3 segments in the middle
  const midX = Math.floor(COLS / 2);
  const midY = Math.floor(ROWS / 2);
  snake = [
    { x: midX,     y: midY },   // head
    { x: midX - 1, y: midY },   // body
    { x: midX - 2, y: midY },   // tail
  ];

  placeFood();
  updateUI();
  setMsg('Use arrow keys or D-pad to steer!');

  // Tick at the chosen speed
  gameLoop = setInterval(tick, speed);
}

// ─────────────────────────────────────────────
// MAIN GAME TICK (runs every `speed` ms)
// ─────────────────────────────────────────────
function tick() {
  // Apply queued direction
  dir = { ...nextDir };

  // Calculate new head position
  const head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y,
  };

  // ── Collision: wall ──
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return gameOver();
  }

  // ── Collision: self ──
  if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
    return gameOver();
  }

  // Move snake: add new head
  snake.unshift(head);

  // Check if food eaten
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    // Level up every 50 points → increase speed
    if (score % 50 === 0) {
      level++;
      clearInterval(gameLoop);
      speed = Math.max(speed - 10, 40); // don't go below 40ms
      gameLoop = setInterval(tick, speed);
    }
    placeFood();
    updateUI();
  } else {
    // No food eaten → remove tail to keep length
    snake.pop();
  }

  draw();
}

// ─────────────────────────────────────────────
// PLACE FOOD (random empty cell)
// ─────────────────────────────────────────────
function placeFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS),
    };
  // Keep trying until food lands on an empty cell
  } while (snake.some(seg => seg.x === pos.x && seg.y === pos.y));
  food = pos;
}

// ─────────────────────────────────────────────
// DRAW EVERYTHING
// ─────────────────────────────────────────────
function draw() {
  // Background grid
  ctx.fillStyle = '#0f3460';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw faint grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * TILE, 0);
    ctx.lineTo(x * TILE, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y < ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * TILE);
    ctx.lineTo(canvas.width, y * TILE);
    ctx.stroke();
  }

  // Draw food (red circle)
  ctx.fillStyle = '#ff6b6b';
  ctx.beginPath();
  ctx.arc(
    food.x * TILE + TILE / 2,
    food.y * TILE + TILE / 2,
    TILE / 2 - 2,
    0, Math.PI * 2
  );
  ctx.fill();

  // Draw snake segments
  snake.forEach((seg, i) => {
    // Head is brighter green; body fades slightly
    ctx.fillStyle = i === 0 ? '#4ecca3' : '#2ea88a';
    ctx.beginPath();
    ctx.roundRect(
      seg.x * TILE + 1,
      seg.y * TILE + 1,
      TILE - 2,
      TILE - 2,
      4   // corner radius
    );
    ctx.fill();

    // Eyes on the head
    if (i === 0) {
      ctx.fillStyle = '#1a1a2e';
      // Eye positions depend on direction
      const ex = dir.x === 0 ? [4, 12] : dir.x > 0 ? [13, 13] : [5, 5];
      const ey = dir.y === 0 ? [5,  5] : dir.y > 0 ? [13, 13] : [5, 5];
      // shift eyes based on move direction
      let eye1x = seg.x * TILE + (dir.x > 0 ? 13 : dir.x < 0 ? 5 : 5);
      let eye1y = seg.y * TILE + (dir.y > 0 ? 13 : dir.y < 0 ? 5 : 5);
      let eye2x = seg.x * TILE + (dir.x !== 0 ? eye1x - seg.x * TILE : 13);
      let eye2y = seg.y * TILE + (dir.y !== 0 ? eye1y - seg.y * TILE : 5);

      // Simple fixed-position eyes
      const px = seg.x * TILE, py = seg.y * TILE;
      if (dir.x > 0)  { drawEye(px+13,py+5);  drawEye(px+13,py+13); }
      if (dir.x < 0)  { drawEye(px+5, py+5);  drawEye(px+5, py+13); }
      if (dir.y > 0)  { drawEye(px+5, py+13); drawEye(px+13,py+13); }
      if (dir.y < 0)  { drawEye(px+5, py+5);  drawEye(px+13,py+5);  }
    }
  });
}

// Helper: draw a small eye dot
function drawEye(x, y) {
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.arc(x, y, 2.5, 0, Math.PI * 2);
  ctx.fill();
}

// ─────────────────────────────────────────────
// GAME OVER
// ─────────────────────────────────────────────
function gameOver() {
  clearInterval(gameLoop);
  running = false;

  // Save best score
  if (score > best) best = score;
  updateUI();

  // Flash the canvas red briefly
  ctx.fillStyle = 'rgba(255, 0, 0, 0.25)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Show game over text
  ctx.fillStyle = 'white';
  ctx.font = 'bold 28px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('Game Over!', canvas.width / 2, canvas.height / 2 - 10);
  ctx.font = '16px Arial';
  ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 20);

  setMsg('Press Start to play again!');
  document.getElementById('startBtn').textContent = '↺ Restart';
}

// ─────────────────────────────────────────────
// UPDATE SCORE / LEVEL DISPLAY
// ─────────────────────────────────────────────
function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent  = best;
  document.getElementById('levelDisplay').textContent = level;
}

function setMsg(text) {
  document.getElementById('msg').textContent = text;
}

// ─────────────────────────────────────────────
// DIRECTION CONTROL (keyboard)
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  // Prevent scrolling the page with arrow keys
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();

  // Queue the next direction (can't reverse into yourself)
  if (e.key === 'ArrowUp'    && dir.y !== 1)  nextDir = { x: 0, y: -1 };
  if (e.key === 'ArrowDown'  && dir.y !== -1) nextDir = { x: 0, y:  1 };
  if (e.key === 'ArrowLeft'  && dir.x !== 1)  nextDir = { x: -1, y: 0 };
  if (e.key === 'ArrowRight' && dir.x !== -1) nextDir = { x:  1, y: 0 };

  // Space / Enter = start
  if ((e.key === ' ' || e.key === 'Enter') && !running) startGame();
});

// ─────────────────────────────────────────────
// DIRECTION CONTROL (mobile D-pad)
// ─────────────────────────────────────────────
document.getElementById('dUp').addEventListener('click',    () => { if (dir.y !== 1)  nextDir = { x: 0,  y: -1 }; });
document.getElementById('dDown').addEventListener('click',  () => { if (dir.y !== -1) nextDir = { x: 0,  y:  1 }; });
document.getElementById('dLeft').addEventListener('click',  () => { if (dir.x !== 1)  nextDir = { x: -1, y:  0 }; });
document.getElementById('dRight').addEventListener('click', () => { if (dir.x !== -1) nextDir = { x:  1, y:  0 }; });

// ─────────────────────────────────────────────
// DIFFICULTY BUTTONS
// ─────────────────────────────────────────────
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    speed = parseInt(btn.dataset.speed); // update speed for next game
  });
});

// ─────────────────────────────────────────────
// START BUTTON
// ─────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', startGame);

// ─────────────────────────────────────────────
// DRAW IDLE SCREEN on load
// ─────────────────────────────────────────────
ctx.fillStyle = '#0f3460';
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.fillStyle = '#4ecca3';
ctx.font = 'bold 24px Arial';
ctx.textAlign = 'center';
ctx.fillText('🐍 Press Start!', canvas.width / 2, canvas.height / 2);
</script>
</body>
</html>
