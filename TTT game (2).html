<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>
<style>
body{
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  background:#111;
  color:#fff;
}
h1{margin-bottom:10px}
.board{
  display:grid;
  grid-template-columns:repeat(3,100px);
  gap:5px;
}
.cell{
  width:100px;
  height:100px;
  background:#222;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  cursor:pointer;
  border-radius:10px;
}
.cell:hover{background:#333}
#status{margin:15px;font-size:20px}
button{
  padding:10px 20px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>
<body>

<h1>Tic Tac Toe</h1>
<div id="status">X Turn</div>

<div class="board" id="board"></div>

<button onclick="resetGame()">Restart</button>

<script>
const board=document.getElementById("board"),
status=document.getElementById("status");

let cells=["","","","","","","","",""],player="X",gameOver=false;

const wins=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

for(let i=0;i<9;i++){
  let cell=document.createElement("div");
  cell.className="cell";
  cell.onclick=()=>move(i,cell);
  board.appendChild(cell);
}

function move(i,cell){
  if(cells[i]||gameOver)return;

  cells[i]=player;
  cell.innerText=player;

  for(let w of wins){
    let[a,b,c]=w;
    if(cells[a]&&cells[a]==cells[b]&&cells[a]==cells[c]){
      status.innerText=player+" Wins!";
      gameOver=true;
      return;
    }
  }

  if(!cells.includes("")){
    status.innerText="Draw!";
    gameOver=true;
    return;
  }

  player=player=="X"?"O":"X";
  status.innerText=player+" Turn";
}

function resetGame(){
  cells=["","","","","","","","",""];
  player="X";
  gameOver=false;
  status.innerText="X Turn";
  document.querySelectorAll(".cell").forEach(c=>c.innerText="");
}
</script>

</body>
</html>
